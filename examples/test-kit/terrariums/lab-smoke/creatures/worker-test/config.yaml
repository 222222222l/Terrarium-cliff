name: worker-test
version: "0.1.0"

controller:
  model: "${OPENROUTER_MODEL:google/gemini-2.5-pro}"
  temperature: 0.1
  max_tokens: 24576
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1

system_prompt_file: prompts/system.md

output:
  type: stdout
  controller_direct: true

tools:
  - name: read
    type: builtin
  - name: write
    type: builtin
  - name: edit
    type: builtin
  - name: bash
    type: builtin
  - name: python
    type: builtin
  - name: glob
    type: builtin
  - name: grep
    type: builtin
  - name: scratchpad
    type: builtin
  - name: think
    type: builtin
  - name: info
    type: builtin
  - name: lab_report
    type: custom
    module: ../../../../test_kit/tools/lab_report.py
    class: LabReportTool

subagents:
  - name: plan
    type: builtin
  - name: summarize
    type: builtin

compact:
  max_tokens: 1000000

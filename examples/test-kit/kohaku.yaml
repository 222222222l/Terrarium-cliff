name: test-kit
version: "0.1.0"
description: "Minimal lab package for fast creature and terrarium testing"

distribution:
  lifecycle_stage: lab
  release_channel: experimental
  marketplace_eligible: false
  governance_policy: release-policy.yaml
  marketplace_name: test-kit
  framework_constraint: ">=2.0.0"
  rollback_modes:
    - editable-revert
    - git-tag-pin
    - marketplace-yank

creatures:
  - name: lab-runner
  - name: root-privileged
  - name: coordinator
  - name: worker-base
  - name: critic
  - name: curator
  - name: evolver

terrariums:
  - name: lab-smoke
  - name: task-team-minimal
  - name: task-team-learning

skills:
  - name: autonomous-cli-builder
    path: skills/autonomous-cli-builder/SKILL.md
    description: CLI-Anything-first CLI creation skill packaged with test-kit.
  - name: opencli-autonomous-builder
    path: skills/opencli-autonomous-builder/SKILL.md
    description: OpenCLI-first CLI creation skill packaged with test-kit.
  - name: provider-aware-cli-builder
    path: skills/provider-aware-cli-builder/SKILL.md
    description: Unified provider-selection skill packaged with test-kit.
  - name: structured-handoff
    path: skills/structured-handoff/SKILL.md
    description: Stable handoff skill for long or ambiguous coordinator-style delegation.
  - name: review-protocol
    path: skills/review-protocol/SKILL.md
    description: Stable critic-side review skill for compact typed feedback and routing.
  - name: memory-curation
    path: skills/memory-curation/SKILL.md
    description: Layered memory curation workflow aligned with the test-kit memory schema.
  - name: evolution-draft-protocol
    path: skills/evolution-draft-protocol/SKILL.md
    description: Draft-only evolution proposal protocol for skills, prompts, policies, and memory rules.

tools:
  - name: lab_report
    module: test_kit.tools.lab_report
    class: LabReportTool
  - name: cli_anything_registry
    module: test_kit.tools.cli_anything_registry
    class: CliAnythingRegistryTool
  - name: cli_invoke
    module: test_kit.tools.cli_invoke
    class: CliInvokeTool
  - name: opencli_registry
    module: test_kit.tools.opencli_registry
    class: OpenCliRegistryTool
  - name: provider_select
    module: test_kit.tools.provider_select
    class: ProviderSelectTool
  - name: result_feedback
    module: test_kit.tools.result_feedback
    class: ResultFeedbackTool

plugins:
  - name: audit_guard
    module: test_kit.plugins.audit_guard
    class: AuditGuardPlugin

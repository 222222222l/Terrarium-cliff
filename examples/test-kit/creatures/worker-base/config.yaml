name: worker-base
version: 0.1.0
description: Small-model-friendly execution worker with a narrow deterministic tool
  surface
controller:
  model: ${WORKER_LLM_MODEL:qwen3.5:9b}
  temperature: 0.0
  max_tokens: 24576
  api_key_env: WORKER_LLM_API_KEY
  base_url: ${WORKER_LLM_BASE_URL:http://127.0.0.1:11434/v1}
system_prompt_file: prompts/system.md
output:
  type: stdout
  controller_direct: true
tools:
- name: read
  type: builtin
- name: edit
  type: builtin
- name: glob
  type: builtin
- name: grep
  type: builtin
- name: json_read
  type: builtin
- name: cli_invoke
  type: custom
  module: ../../test_kit/tools/cli_invoke.py
  class: CliInvokeTool
  provider_name: cli-anything
  timeout_s: 90
  token_budget_mode: silent
  provider_detect_cmd: ''
- name: result_feedback
  type: custom
  module: ../../test_kit/tools/result_feedback.py
  class: ResultFeedbackTool
  agent_format: json
- name: stop_task
  type: builtin
memory:
  path: ./memory
compact:
  max_tokens: 1000000

name: root-privileged
version: 0.1.0
description: User-facing control-plane root for terrarium orchestration
controller:
  model: ${OPENROUTER_MODEL:google/gemini-2.5-pro}
  temperature: 0.1
  max_tokens: 32768
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
system_prompt_file: prompts/system.md
input:
  type: cli
  prompt: 'Root> '
output:
  type: stdout
  controller_direct: true
plugins:
- name: budget
  options:
    turn_budget:
    - 80
    - 120
    tool_call_budget:
    - 120
    - 180
tools:
- name: scratchpad
  type: builtin
- name: think
  type: builtin
- name: ask_user
  type: builtin
- name: info
  type: builtin
- name: stop_task
  type: builtin
- name: lab_report
  type: custom
  module: ../../test_kit/tools/lab_report.py
  class: LabReportTool
  reports_subdir: .kohaku/lab-reports
subagents:
- name: plan
  type: builtin
- name: summarize
  type: builtin
memory:
  path: ./memory
compact:
  max_tokens: 1000000

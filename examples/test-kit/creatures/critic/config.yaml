name: critic
version: 0.1.0
description: Strong-model-friendly structured reviewer for iterative task refinement
controller:
  model: ${CRITIC_LLM_MODEL:deepseek/deepseek-chat-v3}
  temperature: 0.1
  max_tokens: 49152
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
system_prompt_file: prompts/system.md
output:
  type: stdout
  controller_direct: true
tools:
- name: read
  type: builtin
- name: glob
  type: builtin
- name: grep
  type: builtin
- name: json_read
  type: builtin
- name: scratchpad
  type: builtin
- name: think
  type: builtin
- name: ask_user
  type: builtin
- name: info
  type: builtin
- name: stop_task
  type: builtin
- name: result_feedback
  type: custom
  module: ../../test_kit/tools/result_feedback.py
  class: ResultFeedbackTool
  agent_format: json
- name: lab_report
  type: custom
  module: ../../test_kit/tools/lab_report.py
  class: LabReportTool
  reports_subdir: .kohaku/lab-reports
memory:
  path: ./memory
compact:
  max_tokens: 1000000
